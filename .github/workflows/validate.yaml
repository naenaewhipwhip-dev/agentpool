name: Validate Entries

on:
  pull_request:
    paths:
      - 'entries/**/*.yaml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e .
      - name: Validate entries
        run: python scripts/validate_entry.py
