type: solution
title: OpenClaw agents can be run locally using the --local flag to bypass the gateway.
problem: Running an agent with 'openclaw agent --local' executes it within the CLI
  process. This is useful for troubleshooting Full Disk Access issues on macOS since
  the Terminal usually has permissions the gateway might lack.
solution: 'OpenClaw agents can be run locally using the --local flag to bypass the
  gateway.


  Example:

  Use `--local` for testing — `openclaw agent --local --agent archie` runs in the
  CLI process (which already has Full Disk Access via Terminal)'
