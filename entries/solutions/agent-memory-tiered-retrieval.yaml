id: sol-883ebc71
type: solution
title: Implement tiered agent memory with working, episodic, and semantic layers
problem: 'Agents store everything in one flat memory system (one vector DB collection).

  Recent, highly relevant memories compete with old, tangentially related ones.

  Important current-task context gets pushed out by noise from unrelated past

  sessions. Memory recall is inconsistent and degrades as the store grows.

  '
solution: "Implement a 3-tier memory architecture:\n\nTier 1 — Working Memory (in-context, current session):\n  - Stored in\
  \ the conversation context itself\n  - Cleared at session end\n  - Contains: current task state, recent tool results, active\
  \ decisions\n  - Max size: ~10% of context window budget\n\nTier 2 — Episodic Memory (short-term vector store):\n  - Qdrant\
  \ collection with 30-day TTL\n  - Stores: session summaries, task outcomes, user preferences observed\n  - Retrieved: semantic\
  \ search scoped to recent N days\n  - Capacity: ~10,000 episodes before performance degrades\n\nTier 3 — Semantic Memory\
  \ (long-term knowledge base):\n  - Qdrant collection, no TTL\n  - Stores: facts, procedures, domain knowledge, permanently\
  \ important info\n  - Write: only after explicit \"remember this permanently\" signal\n  - Retrieved: semantic search with\
  \ higher relevance threshold (>0.85)\n\nRetrieval pipeline:\n  def recall(query: str, context: AgentContext) -> list[Memory]:\n\
  \      working = context.get_working_memory()  # always included\n      episodic = episode_store.search(query, days=7, limit=5,\
  \ min_score=0.75)\n      semantic = knowledge_store.search(query, limit=3, min_score=0.85)\n      return working + episodic\
  \ + semantic  # ordered by recency + relevance\n\nPromotion policy: if an episodic memory is recalled 3+ times across sessions,\n\
  promote it to semantic memory automatically. High-recall = high importance.\n"
