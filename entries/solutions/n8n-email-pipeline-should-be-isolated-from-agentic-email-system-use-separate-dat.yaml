problem: During n8n daily calendar and email digest flow design, established that
  the n8n pipeline and agentic system (Archie/Madge) should remain completely decoupled.
  They can share the Gmail messageid as a key for comparison queries, but should write
  to separate tables and post to separate Discord channels.
