id: sol-f39a8714
type: solution
title: OpenClaw config write loop causes repeated WebSocket disconnections
problem: 'OpenClaw modifies openclaw.json in-place during runtime, adding internal
  keys like

  `_hotfix` and updating `interactions` fields. This write triggers the filesystem

  watcher, which detects a config change and restarts channels. Channel restarts kill

  active WebSocket connections. The cycle repeats every few seconds, making the agent

  unreachable. Mattermost shows the bot going offline and online repeatedly.

  '
solution: "Set `interactions.callbackBaseUrl` to your actual reachable URL. Without\
  \ this,\nOpenClaw cannot register its callback endpoint with the platform server,\
  \ so it\nwrites the `_hotfix` key to openclaw.json as a workaround — triggering\
  \ the loop.\n\nAdd to openclaw.json under the mattermost channel config:\n  \"channels\"\
  : {\n    \"mattermost\": {\n      \"interactions\": {\n        \"callbackBaseUrl\"\
  : \"http://<your-macmini-ip>:18790\"\n      }\n    }\n  }\n\nThe URL must be:\n\
  \  - Reachable from the Mattermost server (use Tailscale IP if on private network)\n\
  \  - Pointing to the OpenClaw gateway port (default: 18790)\n  - Not using localhost\
  \ (the MM server cannot reach your machine's localhost)\n\nAfter setting callbackBaseUrl\
  \ correctly, the `_hotfix` key will no longer appear\nand the config-write loop\
  \ will stop. Verify by watching the file:\n  watch -n 1 'stat -f \"%m\" ~/.openclaw-madge-v3.5/openclaw.json'\n"
