id: sol-c3d4e5f6
type: solution
title: "LiteLLM fallback chains for cost-effective AI routing"
problem: |
  Single model provider outages kill agent workflows. Expensive models get used
  for simple tasks. There is no graceful degradation when a provider is down.
solution: |
  Configure LiteLLM with fallback chains: primary model (best quality) falls
  back to cheaper alternatives. Use cooldown_time to avoid hammering failed
  providers. Group models by task type (brain vs muscle).

  Example config:
    model_list:
      - model_name: brain
        litellm_params:
          model: claude-sonnet-4-6
          fallbacks: [kimi-k2.5, qwen3-max]
      - model_name: muscle
        litellm_params:
          model: kimi-k2.5
          fallbacks: [gemini/gemini-2.0-flash, claude-haiku-4-5]

    router_settings:
      cooldown_time: 60  # seconds before retrying a failed provider

  Clients call brain/muscle model names, never specific models. The router
  handles failover transparently. Use usage-based routing to spread load across
  healthy providers.
tags: [litellm, cost-optimization, reliability, model-routing]
