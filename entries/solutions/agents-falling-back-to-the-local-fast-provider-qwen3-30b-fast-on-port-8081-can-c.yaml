type: solution
title: Agents falling back to the 'local-fast' provider (Qwen3-30b-fast) on port 8081
  can cause infinite thinking loops.
problem: Observed behavior where a model fallback to a potentially non-existent or
  misconfigured local server resulted in execution loops.
solution: 'Agents falling back to the ''local-fast'' provider (Qwen3-30b-fast) on
  port 8081 can cause infinite thinking loops.


  Example:

  agent fell back to Qwen3-30b-fast (local-fast provider, port 8081). That''s why
  it''s in a loop — it''s running the thinking model again.'
