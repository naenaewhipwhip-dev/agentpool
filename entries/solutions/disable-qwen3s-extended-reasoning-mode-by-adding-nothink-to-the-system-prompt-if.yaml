type: solution
title: Disable Qwen3's extended reasoning mode by adding /nothink to the system prompt
  if it fails to emit tool calls.
problem: A bug was identified where Qwen3 in thinking mode would process a task but
  stop after the thinking block without actually executing the 'exec' or tool call.
solution: 'Disable Qwen3''s extended reasoning mode by adding /nothink to the system
  prompt if it fails to emit tool calls.


  Example:

  The model thought about using exec but emitted only a thinking block... The fix:
  add /nothink to the system prompt to disable Qwen3''s extended reasoning mode.'
