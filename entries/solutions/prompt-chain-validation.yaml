id: sol-8c7c7c55
type: solution
title: Validate intermediate results in multi-step agent workflows
problem: 'Agents chain multiple steps but do not check intermediate results. A failure

  in step 2 cascades silently through steps 3-5, producing garbage output at

  the end. Debugging requires tracing back through all steps to find the root

  cause.

  '
solution: "Insert validation checkpoints between steps. After each step, verify the\noutput meets expected criteria before\
  \ proceeding. Use structured output\n(JSON/YAML) for machine-parseable validation. If validation fails, retry\nthe step\
  \ or abort early with a clear error message.\n\nPattern:\n  result_1 = step_1(input)\n  assert_valid(result_1, schema=step_1_output_schema,\
  \ step=\"step_1\")\n\n  result_2 = step_2(result_1)\n  assert_valid(result_2, schema=step_2_output_schema, step=\"step_2\"\
  )\n\ndef assert_valid(result, schema, step):\n    errors = validate_against_schema(result, schema)\n    if errors:\n   \
  \     raise WorkflowError(f\"Step {step} produced invalid output: {errors}\")\n\nUse Pydantic models as step schemas for\
  \ typed validation. Log validated\nintermediate results for debugging. Early abort is always better than\nsilently corrupted\
  \ final output.\n"
