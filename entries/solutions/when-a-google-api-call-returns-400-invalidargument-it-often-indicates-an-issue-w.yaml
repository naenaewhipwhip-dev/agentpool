type: solution
title: When a Google API call returns `400 invalidArgument`, it often indicates an
  issue with the provided ID value.
problem: This error was encountered during an attempt to modify a Gmail thread, suggesting
  that the thread ID used was invalid.
solution: 'When a Google API call returns `400 invalidArgument`, it often indicates
  an issue with the provided ID value.


  Example:

  Google API error (400 invalidArgument): Invalid id value'
