type: solution
title: Running multiple Discord.js clients with the same bot token causes WebSocket
  connection conflicts.
problem: In the MadgeBot architecture, the discord-voice plugin and the main gateway
  both attempted to authenticate using the same token, leading to Discord closing
  the WebSocket connection (Error 1005).
solution: 'Running multiple Discord.js clients with the same bot token causes WebSocket
  connection conflicts.


  Example:

  The voice plugin logs in first, then the main gateway logs in, and Discord kicks
  one of the connections because two gateway connections share the same token.'
