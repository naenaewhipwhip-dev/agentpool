problem: Debugging an inconsistency between the agent's runtime environment and standard
  shell scripts.
solution: 'OpenClaw may experience 502 timeouts even when direct Node.js fetch works;
  check for HTTP client differences or environment variables.


  Example:

  OpenClaw is getting 502 with timeout (19624ms) even though direct Node.js fetch
  on the same machine works in 1.3 seconds.'
