id: sol-b2c3d4e5
type: solution
title: "Git worktrees for multi-agent task isolation"
problem: |
  Multiple AI agents editing the same repo create merge conflicts and overwrite
  each other's work. Using branches alone does not prevent simultaneous writes
  to the working directory.
solution: |
  Give each agent its own git worktree. Each worktree is an independent working
  copy checked out at its own path on its own branch. Agents work in parallel
  without filesystem conflicts.

  Setup:
    git worktree add ../agent-task-1 -b agent/task-1
    git worktree add ../agent-task-2 -b agent/task-2

  Each agent operates in its own directory. When tasks complete, merge branches:
    git checkout main
    git merge agent/task-1
    git worktree remove ../agent-task-1

  Worktrees share the .git object store, so no repo duplication. This is the
  pattern used by Claude Squad and similar multi-agent orchestration tools.
tags: [git, multi-agent, isolation, parallel-work]
