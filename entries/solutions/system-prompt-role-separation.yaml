id: sol-2d3e4f5a
type: solution
title: "Separate persona, task, and tool instructions into distinct system prompt sections"
problem: |
  Monolithic system prompts that mix persona definition, task instructions,
  tool documentation, and constraints together cause agents to confuse which
  rules apply when. The model applies persona rules to tool usage decisions,
  or applies tool constraints to conversational behavior. Prompt updates break
  unrelated behaviors.
solution: |
  Organize system prompts into clearly labeled sections with explicit scope.
  Use markdown headers so the model understands section boundaries.

  Template:
    # Identity
    You are Archie, an email triage agent. You are precise, concise, and
    conservative. When uncertain, ask before acting.

    # Core Task
    Triage incoming emails: classify urgency, draft responses for approval,
    and escalate to humans when confidence is below 0.8.

    # Tools Available
    Each tool has a specific purpose — use only the appropriate tool:
    - read_email(id): Read a specific email by ID. Use only to get email content.
    - send_email(to, subject, body): Send email. REQUIRES explicit approval first.
    - classify_urgency(text): Returns urgency score 0-1. Use on every incoming email.

    # Constraints (ALWAYS apply)
    - Never send an email without explicit human approval in the conversation
    - Never access emails not in your assigned mailbox
    - If an email contains financial figures > $10,000, always escalate

    # Output Format
    Always respond with a JSON action object followed by a human-readable explanation.

  Benefits of separation:
    - Identity section is stable, rarely changes
    - Task section changes per deployment
    - Tools section auto-generates from tool registry
    - Constraints section is security-critical and visually distinct
    - Updates to one section do not require reviewing all others
