title: Exponential backoff for API rate limits in tool chains
problem: 'When chaining multiple API/tool calls, rate limits cause cascading failures.

  Immediate retries hit the limit again, amplifying the problem and exhausting

  the retry budget quickly without making progress.

  '
solution: "Implement exponential backoff with jitter. Start at 500ms, double each\
  \ retry,\nadd 0-200ms random jitter, cap at 30s. Reset counter on success.\n\nExample\
  \ pattern:\n  base_delay = 0.5  # 500ms\n  max_delay = 30.0\n  for attempt in range(max_retries):\n\
  \      try:\n          result = call_api()\n          reset_counter()\n        \
  \  return result\n      except RateLimitError:\n          delay = min(base_delay\
  \ * (2 ** attempt), max_delay)\n          delay += random.uniform(0, 0.2)  # jitter\n\
  \          time.sleep(delay)\n\nThe jitter prevents thundering-herd when multiple\
  \ agents retry simultaneously.\n"
