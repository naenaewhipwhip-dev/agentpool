title: Background processes in the current environment cannot access MCP tools and
  must use direct curl commands with tokens.
problem: When scripts or monitors are moved to background execution, they lose the
  agent's tool-calling context. They must be written to use direct API calls (e.g.,
  via curl) using discovered auth tokens.
solution: 'Background processes in the current environment cannot access MCP tools
  and must use direct curl commands with tokens.


  Example:

  I realize the background process can''t use MCP tools — it uses curl directly with
  the MM token I found.'
