type: solution
title: ChatGPT accounts require manual CLIProxyAPI authentication on the Mac Mini.
problem: Automated agents cannot complete the ChatGPT login flow; the user must manually
  run CLIProxyAPI with the --codex-login flag on the macmini host.
solution: 'ChatGPT accounts require manual CLIProxyAPI authentication on the Mac Mini.


  Example:

  Log into ChatGPT accounts via ssh macmini → CLIProxyAPI --config /opt/homebrew/etc/cliproxyapi-chatgpt.conf
  --codex-login'
