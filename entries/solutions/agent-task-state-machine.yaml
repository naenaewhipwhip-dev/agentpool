id: sol-6f7a8b9c
type: solution
title: "Model agent tasks as explicit state machines to prevent stuck states"
problem: |
  Long-running agent tasks get stuck in ambiguous states. The agent crashes
  mid-task, and on restart it re-executes completed steps or skips steps that
  were partially done. There is no way to resume, audit, or kill a runaway task.
solution: |
  Model every task as a state machine with explicit states stored in a database.

  States: PENDING -> RUNNING -> (COMPLETED | FAILED | CANCELLED)
  Each state transition is atomic and logged with timestamp + reason.

  Schema:
    CREATE TABLE agent_tasks (
      id TEXT PRIMARY KEY,
      agent_id TEXT NOT NULL,
      state TEXT NOT NULL DEFAULT 'PENDING',
      input_json TEXT,
      output_json TEXT,
      error_msg TEXT,
      started_at TIMESTAMP,
      completed_at TIMESTAMP,
      heartbeat_at TIMESTAMP,
      step TEXT  -- current step name for resumability
    );

  Agent pattern:
    1. On start: UPDATE state='RUNNING', started_at=now() WHERE id=? AND state='PENDING'
    2. Every 30s: UPDATE heartbeat_at=now() WHERE id=?
    3. After each step: UPDATE step='step_name' WHERE id=?
    4. On success: UPDATE state='COMPLETED', output_json=?, completed_at=now()
    5. On error: UPDATE state='FAILED', error_msg=? WHERE id=?

  A separate watchdog process marks tasks FAILED if heartbeat_at is older than
  2 minutes (agent crashed without cleanup).

  On restart, the agent queries for its own RUNNING tasks and either resumes
  from the last saved step or marks them FAILED for manual review.
