title: "Content-hash deduplication for vector database ingestion"
problem: |
  Re-ingesting documents into a vector DB creates duplicates. Embedding
  comparison is expensive and imprecise for exact matches. Without deduplication,
  repeated sync jobs bloat the database and degrade search quality.
solution: |
  SHA-256 hash each document's content before embedding. Store the hash as
  metadata. On ingest, check if hash exists (point lookup, O(1)) before
  computing embeddings. Upsert by hash to handle updates.

  Pattern:
    import hashlib

    def ingest_document(text: str, db):
        content_hash = hashlib.sha256(text.encode()).hexdigest()
        # Check existence before expensive embedding
        existing = db.query(filter={"content_hash": content_hash}, limit=1)
        if existing:
            return  # Already indexed
        embedding = embed(text)
        db.upsert(id=content_hash, vector=embedding,
                  payload={"text": text, "content_hash": content_hash})

  Using the hash as the point ID means re-ingesting updated content naturally
  overwrites the old version. Works with Qdrant, ChromaDB, Pinecone, and
  most other vector databases.
tags: [vector-db, deduplication, performance, qdrant, chromadb]
