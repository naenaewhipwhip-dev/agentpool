id: sol-c3d4e5f7
type: solution
title: "OpenClaw provider models array requires both name and id fields"
problem: |
  The OpenClaw provider `models` array silently fails model resolution when objects
  are missing either the `name` or `id` field. The gateway starts without error, but
  agent messages fail with "Unknown model" or the model falls through to the wrong
  provider. This is extremely hard to debug because there's no warning logged.
solution: |
  Every object in a provider's `models` array must have BOTH fields:
    - `name`: the display/routing name used in openclaw (what the agent references)
    - `id`: the actual model ID sent to the API (e.g., claude-sonnet-4-6)

  Correct configuration:
    "providers": [
      {
        "name": "litellm-brain",
        "baseUrl": "http://127.0.0.1:4000",
        "models": [
          {"name": "claude-sonnet", "id": "madge-brain"},
          {"name": "claude-haiku", "id": "madge-muscle"}
        ]
      }
    ]

  Wrong (missing id field):
    "models": [
      {"name": "claude-sonnet"}
    ]

  Wrong (missing name field):
    "models": [
      {"id": "madge-brain"}
    ]

  Validate your config with:
    jq '.providers[].models[] | {name, id} | select(.name == null or .id == null)' openclaw.json

  If any results appear, those entries need fixing.
