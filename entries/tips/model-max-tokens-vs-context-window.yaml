id: tip-0d1e2f3a
type: tip
title: "max_tokens limits output length, not input — confusing them wastes budget"
content: |
  A persistent source of confusion: max_tokens in LLM APIs controls the
  maximum number of tokens the model OUTPUTS, not the size of the input/context.
  Setting max_tokens=1000 does not protect you from sending a 100k-token input
  and paying for it. It only caps how much the model writes back.

  The parameter you need for input budget is the model's context window limit,
  which you must manage yourself by counting input tokens before sending.

  Common mistakes:
    # WRONG: thinking this limits context cost
    response = client.messages.create(max_tokens=500, messages=long_messages)
    # You still pay for all tokens in long_messages

    # RIGHT: check input size before sending
    input_tokens = count_tokens(messages)
    if input_tokens > MAX_INPUT_BUDGET:
        messages = truncate_messages(messages, MAX_INPUT_BUDGET)
    response = client.messages.create(max_tokens=500, messages=messages)

  Set max_tokens intentionally based on expected output:
    - Simple yes/no classification: max_tokens=10
    - JSON object extraction: max_tokens=500
    - Code generation (function): max_tokens=2000
    - Long-form analysis: max_tokens=4000

  Leaving max_tokens at the model default (often 4096 or 8192) for
  classification tasks wastes potential output tokens and can cause the
  model to pad its response with unnecessary explanation.
