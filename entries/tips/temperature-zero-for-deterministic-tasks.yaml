type: tip
title: "Set temperature=0 for classification and extraction, not for generation"
content: |
  Temperature controls randomness. For tasks with a single correct answer
  (classification, extraction, schema mapping, yes/no decisions) use temperature=0
  for maximum determinism and reproducibility. For generative tasks (writing,
  brainstorming, summaries) use temperature=0.3-0.7 for natural variation.

  Common mistake: using the default temperature (usually 1.0) for all tasks.
  Classification with temperature=1.0 produces inconsistent results on identical
  inputs — the same email gets classified as "urgent" on one run and "normal"
  on the next.

  Task to temperature guide:
    - JSON extraction from text:        temperature=0
    - Classification (N categories):    temperature=0
    - Named entity recognition:         temperature=0
    - Code generation:                  temperature=0 (for correctness)
    - Email draft writing:              temperature=0.5
    - Creative brainstorming:           temperature=0.7-1.0
    - Agent reasoning/planning:         temperature=0 (reproducible plans)

  Note: temperature=0 is not always literally 0 — some providers use a small
  epsilon (0.001) internally. The output will be deterministic for practical
  purposes but may vary across provider updates as the underlying model changes.

  For regression testing, always pin temperature=0 so that test failures
  represent real behavioral changes, not random variation.
