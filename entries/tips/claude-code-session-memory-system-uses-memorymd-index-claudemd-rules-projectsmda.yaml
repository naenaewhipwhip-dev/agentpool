type: tip
title: Claude Code session memory system uses MEMORY.md index + CLAUDE.md rules +
  projects.md/auditions.md trackers
content: 'Claude Code session memory system uses MEMORY.md index + CLAUDE.md rules
  + projects.md/auditions.md trackers


  Context:

  The system auto-loads MEMORY.md (96 lines), which triggers CLAUDE.md rules to read
  projects.md and auditions.md. Claude then sees deadlines, flags stale projects,
  and updates trackers after working. No infrastructure or cron jobs needed.


  Example:

  MEMORY.md loads (96 lines, index) — auto-loaded by Claude Code. CLAUDE.md rule fires
  — tells Claude to read projects.md + auditions.md'
