title: 'All bot write operations must log to #audit-log and SOUL.md must include escalation
  triggers'
content: 'All bot write operations must log to #audit-log and SOUL.md must include
  escalation triggers


  Context:

  Standardized safety protocol for autonomous agents to ensure accountability and
  prevent ''freestyling'' with SSH access.


  Example:

  Every write operation across all bots gets logged to #audit-log - Each SOUL.md gets
  a ''When to Escalate'' section'
