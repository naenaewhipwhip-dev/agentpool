title: Madge follow-up cron job (task-followup.py) runs every 5 minutes on Mac mini
  via launchd to check task status and re-eng
content: 'Madge follow-up cron job (task-followup.py) runs every 5 minutes on Mac
  mini via launchd to check task status and re-engage agents on stalled work


  Context:

  Identified that Madge had a ''fire-and-forget'' gap — she spawned agents but never
  followed up on task completion. Implemented a launchd plist running task-followup.py
  every 5 minutes to poll task status and re-engage agents on incomplete work.


  Example:

  Created task-followup.py script, deployed to Mac mini, created launchd plist running
  every 5 minutes.'
