type: tip
title: Agent mesh monitoring in the archietanner namespace relies on Prometheus metrics
  for pod status and resource usage.
content: 'Agent mesh monitoring in the archietanner namespace relies on Prometheus
  metrics for pod status and resource usage.


  Context:

  Standard queries for agent health include kubepodstatusphase for running counts
  and containermemoryworkingsetbytes for resource tracking within the archietanner
  namespace.


  Example:

  Query: count(kubepodstatusphase{namespace=~"archietanner",phase="Running"} == 1)'
