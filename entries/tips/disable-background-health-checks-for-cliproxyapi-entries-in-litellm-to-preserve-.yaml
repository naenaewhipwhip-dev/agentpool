type: tip
title: Disable background health checks for CLIProxyAPI entries in LiteLLM to preserve
  API quota.
content: 'Disable background health checks for CLIProxyAPI entries in LiteLLM to preserve
  API quota.


  Context:

  To resolve the health check death spiral, the infrastructure manifest was updated
  to explicitly disable background checks for proxied CLI accounts.


  Example:

  All CLIProxyAPI entries have disablebackgroundhealthcheck: true'
