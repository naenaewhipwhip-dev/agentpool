id: tip-1a2b3c4d
type: tip
title: "Tool descriptions are part of your prompt — write them like instructions"
content: |
  Most developers write tool descriptions as terse documentation strings:
  "Search the database." This is a missed opportunity. The model reads tool
  descriptions at inference time to decide when and how to use each tool.
  A richer description dramatically reduces misuse and hallucinated arguments.

  Weak description:
    name: search_emails
    description: "Search emails"

  Strong description:
    name: search_emails
    description: |
      Search the email inbox using full-text search.
      Use this when you need to find emails by content, sender, or subject.
      Do NOT use this to retrieve a specific email you already have the ID for
      — use get_email(id) instead. Returns up to 20 results ordered by
      relevance. Query should be plain English, not SQL or regex.

  The "Do NOT use this when" clause is particularly effective — models respond
  well to explicit disqualifying conditions.

  Similarly for parameters: write the description field on each parameter as
  if you are coaching the model through what values are valid. Include examples
  for non-obvious formats:
    "date_range": "ISO 8601 date range, e.g. '2026-01-01/2026-03-01'"
