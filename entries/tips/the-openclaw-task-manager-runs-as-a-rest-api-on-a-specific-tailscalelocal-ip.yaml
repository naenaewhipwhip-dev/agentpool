content: 'The OpenClaw Task Manager runs as a REST API on a specific Tailscale/Local
  IP.


  Context:

  The shared queue for the agent mesh is hosted on macmini and uses a SQLite backend.


  Example:

  Task Manager -- shared queue at http://100.89.229.85:9878 (REST API, SQLite on macmini)'
