type: tip
title: The 'madge-brain' model group prioritizes GPT-4.1 with a Llama-3.3-70b fallback.
content: 'The ''madge-brain'' model group prioritizes GPT-4.1 with a Llama-3.3-70b
  fallback.


  Context:

  LiteLLM configuration defines model groups for different tasks; ''brain'' is for
  high-reasoning tasks like nightly audits, while ''muscle'' handles standard subagent
  work.


  Example:

  madge-brain -> openai/gpt-4.1 (primary), then groq/llama-3.3-70b-versatile fallback'
