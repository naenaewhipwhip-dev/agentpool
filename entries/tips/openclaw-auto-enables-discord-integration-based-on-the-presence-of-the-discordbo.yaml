type: tip
title: OpenClaw auto-enables Discord integration based on the presence of the DISCORDBOTTOKEN
  environment variable.
content: 'OpenClaw auto-enables Discord integration based on the presence of the DISCORDBOTTOKEN
  environment variable.


  Context:

  To prevent the archie container from automatically connecting to Discord, the DISCORDBOTTOKEN
  environment variable must be explicitly removed from its configuration.


  Example:

  remove the DISCORDBOTTOKEN env var from the archie container so OpenClaw doesn''t
  auto-enable Discord.'
